name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const title = pr.title || ''
            const body = pr.body || ''
            const conventional = /^(feat|fix|docs|test|ci|chore|refactor|perf|build)(\(.+\))?!?: .+/.test(title)

            if (!conventional) {
              core.setFailed('PR title must use a conventional commit prefix, for example: feat: add command.')
              return
            }

            if (body.trim().length < 20) {
              core.setFailed('PR body must describe the change and validation performed.')
            }
