name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CI: true
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm run dist:local

      - name: Verify package launcher
        run: pnpm run package:verify

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agx-release-${{ runner.os }}-${{ runner.arch }}
          path: |
            release-artifacts/agx-*

  github-release:
    name: Upload GitHub Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "AGX release $TAG_NAME"
          find artifacts -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --clobber
